name: Deploy to GitHub Pages

on:
  # Build + deploy on every push to main.
  push:
    branches: [main]
  # Manual trigger for test deployments from any branch / state.
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel in-flight runs; queue them so deploys finish cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          # Project pages live under `/<repo-name>/`. Setting BASE_PATH here
          # lets svelte.config.js rewrite asset URLs so the deployed site
          # works regardless of repo casing or rename.
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Add SPA fallback for Pages
        # GitHub Pages serves `404.html` for unknown paths, which is the
        # SvelteKit `fallback` file from adapter-static — exactly what we want.
        run: |
          if [ -f build/index.html ] && [ ! -f build/404.html ]; then
            cp build/index.html build/404.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
